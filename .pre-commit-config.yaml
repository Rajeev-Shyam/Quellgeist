repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0            # `pre-commit autoupdate` bumps these to latest
    hooks:
      - id: trailing-whitespace
        exclude: ^finetune/chat_template\.jinja$
      - id: end-of-file-fixer
        # byte-exact vendored artifact; its sha256 is pinned in render_report.json
        exclude: ^finetune/chat_template\.jinja$
      - id: check-toml
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.18
    hooks:
      - id: ruff
        args: [--fix]
  - repo: https://github.com/psf/black
    rev: 26.5.1
    hooks:
      - id: black
