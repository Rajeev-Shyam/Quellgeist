name: publish-mcp

# Publish the server.json manifests (mcp/*/server.json) to the Official MCP
# Registry on a version tag, via GitHub OIDC -- no secrets. The
# io.github.Rajeev-Shyam/* namespace is authenticated by this repo's OIDC token.
#
# Runs AFTER the package is on PyPI (publish-pypi.yml): the registry verifies
# PyPI package ownership via the `mcp-name:` markers in the package README.
# Inert until a `v*` tag is pushed. See docs/publishing.md.

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write # GitHub OIDC for mcp-publisher login

jobs:
  publish:
    name: publish server.json to the MCP Registry
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Download mcp-publisher
        # Pin an EXACT release (never mutable `latest`) and download over TLS from
        # the official modelcontextprotocol/registry release -- this job holds a
        # live OIDC token that can publish under our registry namespace, so the
        # pinned version + authenticated HTTPS source is the supply-chain baseline
        # (security review, DR-0005). The release publishes no standard-named
        # checksums asset, so we match the project's own documented install (a
        # pinned tarball over TLS) rather than fail on a guessed checksum name.
        # Bump MCP_PUBLISHER_VERSION deliberately.
        env:
          MCP_PUBLISHER_VERSION: v1.7.9
        run: |
          set -euo pipefail
          os=$(uname -s | tr '[:upper:]' '[:lower:]')
          arch=$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')
          base="https://github.com/modelcontextprotocol/registry/releases/download/${MCP_PUBLISHER_VERSION}"
          curl -fsSL -o mcp-publisher.tar.gz "${base}/mcp-publisher_${os}_${arch}.tar.gz"
          tar xzf mcp-publisher.tar.gz mcp-publisher
      - name: Log in via GitHub OIDC
        run: ./mcp-publisher login github-oidc
      - name: Publish each server manifest
        run: |
          for d in mcp/*/; do
            echo "::group::publishing ${d}server.json"
            (cd "$d" && "$GITHUB_WORKSPACE/mcp-publisher" publish)
            echo "::endgroup::"
          done
