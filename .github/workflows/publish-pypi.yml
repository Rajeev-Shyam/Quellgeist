name: publish-pypi

# Build + publish the package to PyPI on a version tag, via PyPI Trusted
# Publishing (OIDC) -- no stored token. The MCP Registry publish
# (publish-mcp.yml) depends on the package existing on PyPI, so this runs first.
#
# ONE-TIME SETUP (see docs/publishing.md): register a trusted publisher for this
# repo + this workflow file at https://pypi.org/manage/account/publishing/.
# Inert until a `v*` tag is pushed.

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write # PyPI Trusted Publishing (OIDC) -- no API token needed

jobs:
  pypi:
    name: build + publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: uv build
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
