name: publish-pypi

# Build + publish the package to PyPI on a version tag, via PyPI Trusted
# Publishing (OIDC) -- no stored token. The MCP Registry publish
# (publish-mcp.yml) depends on the package existing on PyPI, so this runs first.
#
# ONE-TIME SETUP (see docs/publishing.md): register a trusted publisher for this
# repo + this workflow file at https://pypi.org/manage/account/publishing/.
# Inert until a `v*` tag is pushed.

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write # PyPI Trusted Publishing (OIDC) -- no API token needed

jobs:
  pypi:
    name: build + publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: uv build
      - name: Publish to PyPI (Trusted Publishing)
        # NOTE: this is a *Docker* action whose image is published to ghcr.io by
        # version/branch tag, NOT by commit SHA -- so it can't be SHA-pinned (a
        # SHA ref makes GitHub pull a nonexistent `:<sha>` image -> "manifest
        # unknown"). Pin to the pypa-maintained release branch, as their trusted-
        # publishing docs prescribe; PyPI Trusted Publishing (OIDC) is the actual
        # trust anchor here, not the action ref.
        uses: pypa/gh-action-pypi-publish@release/v1
