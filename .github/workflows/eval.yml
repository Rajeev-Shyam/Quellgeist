name: eval

# Model-driven fixture eval: the reasoner loop + verifier + advisory LLM-judge +
# deterministic gate, run against the configured model to produce reliability
# numbers. Deliberately OUT-OF-BAND -- not on feature PRs/pushes -- because a
# free-tier key can't sustain a model run on every commit. The keyless
# deterministic gate in ci.yml is the reliability gate; this is a reporting job.
#
# Reasoner = Groq llama-3.3-70b. Gemini's free tier proved unusable from cloud CI
# (429 -> 503 -> Timeout across Actions + Codespaces, DR-0012/DR-0015); Groq's free
# tier completes the run reliably (DR-0017). The model is config (QG_MODEL), so
# this is a one-line swap -- the model-agnostic thesis in action.
#
# Runs on a manual trigger and on merges to main. Key-gated: skips with no
# GROQ_API_KEY secret. The harness also treats an unreachable backend (quota /
# 503 / timeout) OR rejected credentials (missing / invalid / stale key) as a
# SKIP, not a failure -- so a bad or absent secret reports a clean skip, never a
# red X (DR-0015/DR-0017).

on:
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  eval:
    name: real-model eval (key-gated)
    runs-on: ubuntu-latest
    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      # Pin the model explicitly -- never rely on the library default. Override
      # QG_MODEL per-run to point at any other LiteLLM model.
      QG_MODEL: groq/llama-3.3-70b-versatile
      # Run the full reliability stack: verifier pass + advisory LLM-judge
      # (DR-0016). The LLM-judge rubric is advisory (and self-grading while it
      # shares QG_MODEL) -- the keyless gate is the deterministic judge + check.
      QG_VERIFY: "1"
      QG_JUDGE_LLM: "1"
      # Pace calls under Groq's free-tier RPM. Wave 3 grew the corpus to ~65
      # scenarios; an unpaced burst (loop + verifier + judge per scenario) trips
      # the rate limit, and the harness then SKIPs green with no number
      # (DR-0012). A small inter-call delay keeps a full run under the cap.
      # Starting point -- tune per the observed limit.
      QG_MIN_CALL_INTERVAL_S: "3"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Sync dependencies
        run: uv sync
      - name: Fixture eval against the configured model (skips without a key)
        run: |
          if [ -z "$GROQ_API_KEY" ]; then
            echo "No GROQ_API_KEY secret -> skipping the model-driven eval (DR-0012)."
            echo "The keyless deterministic gate (ci.yml) is the reliability gate."
            exit 0
          fi
          echo "Running the eval against $QG_MODEL ..."
          uv run python -m evals.run_evals
