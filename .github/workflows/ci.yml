name: ci

# Deterministic gate: lint (ruff + black via pre-commit) and the pytest suite,
# which includes the eval HARNESS run against fixtures. It does NOT call a live
# model -- real model-driven evals are key-gated and land in Wave 2 (DR-0012),
# so naming this "evals" overstated it. Keyless, so it stays green on fork PRs.

on:
  push:
  pull_request:

jobs:
  test:
    name: lint + test gate (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: Sync dependencies
        run: uv sync
      - name: Lint + format check (ruff + black via pre-commit)
        run: uv run pre-commit run --all-files
      - name: Tests (deterministic gate)
        run: uv run pytest tests/ -q

  eval:
    # Key-gated, model-driven fixture eval (reasoner loop + keyword judge +
    # deterministic fabrication check). The `test` job is the real reliability
    # gate (DR-0012): this one skips cleanly when no model key secret is set, so
    # fork PRs (which never see the secret) stay green and a walled free tier
    # can't redden CI. The verifier / LLM-judge are still stubs (DR-0014), so
    # they are not invoked here.
    name: real-model eval (key-gated)
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Sync dependencies
        run: uv sync
      - name: Fixture eval against the configured model (skips without a key)
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "No model key secret -> skipping the model-driven eval (DR-0012)."
            echo "The keyless deterministic gate (job 'test') is the reliability gate."
            exit 0
          fi
          uv run python -m evals.run_evals
